# WorkTracker — Default configuration (committed to git)
#
# This file is the template for the gitignored companion file
# `daemon/config.yaml`, which is auto-created on first run by copying
# this file. Personal tweaks belong in the user file, not here.
#
# Every loader in the daemon bootstraps the user file from this default
# if it is missing.

version: "0.2.0"
author: "worktracker"

collector:
  interval_seconds: 5
  data_dir: ~/WorkTracker/data/snapshots
  log_dir: ~/WorkTracker/logs
  track_clipboard_content: true    # Full content allowed
  track_input_counts: true
  track_media: true
  track_all_windows: true

  # Keystroke content — WARNING: Captures typed plaintext
  track_keystroke_content: true

  # Browser history — URLs instead of just window titles
  track_browser_urls: true

  # Git integration — Track commits and branches
  track_git: true
  git_repos: []
  #  - ~/Projects/my-project
  #  - ~/WorkTracker
  git_scan_interval_seconds: 333

  # Calendar integration — Read meetings from macOS Calendar
  track_calendar: true

  # Screenshots — speichert ein PNG pro interval_seconds, das alle aktiven
  # Displays als Union-Rect umfasst. Erfordert Screen-Recording-Berechtigung
  # (System Settings > Privacy & Security > Screen Recording).
  # Default disabled — opt-in im user config.yaml.
  screenshot:
    enabled: false
    interval_seconds: 60
    dir: ~/WorkTracker/data/screenshots
    # bundle IDs, in denen NIE ein Screenshot entstehen darf
    skip_bundle_ids:
      - com.agilebits.onepassword7
      - com.1password.1password

  # Distraction warning — macOS notification on prolonged distraction
  notifications:
    enabled: true
    threshold_minutes: 3           # Default threshold (used when category has no override)
    cooldown_minutes: 10
    # distraction_categories supports two forms:
    #   - List form: all categories share `threshold_minutes`
    #       distraction_categories:
    #         - "Social Media"
    #         - "Media/Entertainment"
    #   - Dict form: per-category threshold in minutes (overrides the default)
    distraction_categories:
      "Social Media": 3
      "Media/Entertainment": 3

aggregator:
  sessions_dir: ~/WorkTracker/data/sessions
  summaries_dir: ~/WorkTracker/summaries
  idle_threshold_seconds: 300
  focus_session_min_seconds: 1200
  fuzzy_match_threshold: 0.66
  same_app_grace_period_seconds: 15   # Tab switch within same app → merge
  min_session_snapshots: 3            # Micro-sessions (<4 snapshots / <20s) get absorbed

  # Calendar time classification
  calendar_classification:
    meeting_keywords: ["Meeting", "Call", "Standup", "Review", "Sync", "1:1"]
    deep_work_min_minutes: 45

  # Topic extraction via a LOCAL LLM (LM Studio / Ollama / any
  # OpenAI-compatible HTTP endpoint). Session titles, URLs and filenames
  # are sent to the endpoint. Clipboard samples are NEVER sent.
  topic_llm:
    enabled: false
    endpoint: "http://localhost:1234/v1/chat/completions"
    model: "local-model"
    timeout_seconds: 8
    batch_size: 10
    max_sessions_per_day: 200
    min_session_seconds: 60

  # Motivations-Extraktion via VISION-LLM (OpenAI-kompatibles
  # chat/completions mit image_url content parts). Sendet pro Session bis
  # zu max_images_per_session Screenshots plus minimaler Session-Meta und
  # erwartet einen kurzen deutschen Motivationssatz zurueck.
  # Endpoint MUSS LOKAL bleiben — Screenshots zeigen alles vom Bildschirm.
  motivation_llm:
    enabled: false
    endpoint: ""        # z.B. http://localhost:1234/v1/chat/completions
    model: "local-vision-model"
    timeout_seconds: 30
    max_images_per_session: 6
    max_sessions_per_day: 40
    min_session_seconds: 300
    image_max_bytes: 1500000
