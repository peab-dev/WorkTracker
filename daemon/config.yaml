version: "0.0.1"
author: "peab.at"

collector:
  interval_seconds: 5
  data_dir: ~/WorkTracker/data/snapshots
  log_dir: ~/WorkTracker/logs
  track_clipboard_content: true    # Full content allowed
  track_input_counts: true
  track_media: true
  track_all_windows: true

  # Keystroke content — WARNING: Captures typed plaintext
  track_keystroke_content: true

  # Browser history — URLs instead of just window titles
  track_browser_urls: true

  # Git integration — Track commits and branches
  track_git: true
  git_repos: []
  #  - ~/Projects/easyams
  #  - ~/WorkTracker
  git_scan_interval_seconds: 333

  # Calendar integration — Read meetings from macOS Calendar
  track_calendar: true

  # Distraction warning — macOS notification on prolonged distraction
  notifications:
    enabled: true
    threshold_minutes: 3           # Default threshold (used when category has no override)
    cooldown_minutes: 10
    # Categories that trigger warnings. Two forms supported:
    #   - List form: all categories share `threshold_minutes`
    #       distraction_categories:
    #         - "Social Media"
    #         - "Media/Entertainment"
    #   - Dict form: per-category threshold in minutes (overrides the default)
    distraction_categories:
      "Social Media": 3
      "Media/Entertainment": 3

aggregator:
  sessions_dir: ~/WorkTracker/data/sessions
  summaries_dir: ~/WorkTracker/summaries
  idle_threshold_seconds: 300
  focus_session_min_seconds: 1200
  fuzzy_match_threshold: 0.66
  same_app_grace_period_seconds: 15   # Tab switch within same app → merge
  min_session_snapshots: 3            # Micro-sessions (<4 snapshots / <20s) get absorbed

  # Calendar time classification
  calendar_classification:
    meeting_keywords: ["Meeting", "Call", "Standup", "Review", "Sync", "1:1"]
    deep_work_min_minutes: 45
