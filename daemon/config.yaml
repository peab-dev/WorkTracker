version: "0.0.1"
author: "peab.at"

collector:
  interval_seconds: 10
  data_dir: ~/WorkTracker/data/snapshots
  log_dir: ~/WorkTracker/logs
  track_clipboard_content: true    # Full content allowed
  track_input_counts: true
  track_media: true
  track_all_windows: true

  # Keystroke content — WARNING: Captures typed plaintext
  track_keystroke_content: false

  # Browser history — URLs instead of just window titles
  track_browser_urls: true

  # Git integration — Track commits and branches
  track_git: false
  git_repos: []
  #  - ~/Projects/easyams
  #  - ~/WorkTracker
  git_scan_interval_seconds: 60

  # Calendar integration — Read meetings from macOS Calendar
  track_calendar: false

  # Distraction warning — macOS notification on prolonged distraction
  notifications:
    enabled: false
    threshold_minutes: 15
    cooldown_minutes: 30
    distraction_categories:
      - "Social Media"
      - "Media/Entertainment"

aggregator:
  sessions_dir: ~/WorkTracker/data/sessions
  summaries_dir: ~/WorkTracker/summaries
  idle_threshold_seconds: 120
  focus_session_min_seconds: 1500
  fuzzy_match_threshold: 0.7
  same_app_grace_period_seconds: 30   # Tab switch within same app → merge
  min_session_snapshots: 2            # Micro-sessions (<2 snapshots) get absorbed

  # Calendar time classification
  calendar_classification:
    meeting_keywords: ["Meeting", "Call", "Standup", "Review", "Sync", "1:1"]
    deep_work_min_minutes: 60
